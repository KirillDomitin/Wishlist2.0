map $http_user_agent $is_preview_bot {
    default                  0;
    "~*TelegramBot"          1;
    "~*facebookexternalhit"  1;
    "~*Twitterbot"           1;
    "~*Slackbot"             1;
    "~*Discordbot"           1;
    "~*WhatsApp"             1;
    "~*vkShare"              1;
    "~*Applebot"             1;
}

server {
    listen 80;
    server_name wl.404.mn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name wl.404.mn;

    ssl_certificate     /etc/letsencrypt/live/wl.404.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wl.404.mn/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    resolver 127.0.0.11 valid=30s;

    client_max_body_size 10m;

    location /uploads/ {
        alias /uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /_internal/auth {
        internal;
        set $auth_backend http://user-service:8000/internal/verify;
        proxy_pass $auth_backend;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
    }

    location ~ ^/api/users/(register|verify-email|login|refresh|logout|forgot-password|reset-password) {
        set $user_svc http://user-service:8000;
        proxy_pass $user_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/wishlists/shared/ {
        set $wishlist_svc http://wishlist-service:8000;
        proxy_pass $wishlist_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/og/shared/ {
        set $wishlist_svc http://wishlist-service:8000;
        proxy_pass $wishlist_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/shared/([A-Za-z0-9_=-]+)$ {
        if ($is_preview_bot) {
            rewrite ^/shared/(.+)$ /api/og/shared/$1 last;
        }
        set $frontend_svc http://frontend:80;
        proxy_pass $frontend_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_intercept_errors on;
        error_page 404 = @frontend_fallback;
    }

    location /api/users/ {
        auth_request /_internal/auth;
        auth_request_set $user_id $upstream_http_x_user_id;
        proxy_set_header X-User-Id $user_id;
        set $user_svc http://user-service:8000;
        proxy_pass $user_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/wishlists/ {
        auth_request /_internal/auth;
        auth_request_set $user_id $upstream_http_x_user_id;
        proxy_set_header X-User-Id $user_id;
        set $wishlist_svc http://wishlist-service:8000;
        proxy_pass $wishlist_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/reservations/ {
        auth_request /_internal/auth;
        auth_request_set $user_id $upstream_http_x_user_id;
        proxy_set_header X-User-Id $user_id;
        set $reserv_svc http://reservation-service:8000;
        proxy_pass $reserv_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        set $frontend_svc http://frontend:80;
        proxy_pass $frontend_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_intercept_errors on;
        error_page 404 = @frontend_fallback;
    }

    location @frontend_fallback {
        set $frontend_svc http://frontend:80;
        rewrite ^(.*)$ /index.html break;
        proxy_pass $frontend_svc;
    }
}
