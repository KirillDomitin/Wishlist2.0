upstream user_service {
    server user-service:8000;
}

upstream wishlist_service {
    server wishlist-service:8000;
}

upstream reservation_service {
    server reservation-service:8000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 10m;

    # Serve uploaded images as static files
    location /uploads/ {
        alias /uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Internal auth subrequest
    location = /_internal/auth {
        internal;
        proxy_pass http://user_service/internal/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
    }

    # Public: registration, login, token refresh & logout
    location ~ ^/api/users/(register|login|refresh|logout) {
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Public: shared wishlist by token
    location ~ ^/api/wishlists/shared/ {
        proxy_pass http://wishlist_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Protected: user service
    location /api/users/ {
        auth_request /_internal/auth;
        auth_request_set $user_id $upstream_http_x_user_id;
        proxy_set_header X-User-Id $user_id;
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Protected: wishlist service
    location /api/wishlists/ {
        auth_request /_internal/auth;
        auth_request_set $user_id $upstream_http_x_user_id;
        proxy_set_header X-User-Id $user_id;
        proxy_pass http://wishlist_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Protected: reservation service
    location /api/reservations/ {
        auth_request /_internal/auth;
        auth_request_set $user_id $upstream_http_x_user_id;
        proxy_set_header X-User-Id $user_id;
        proxy_pass http://reservation_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend SPA
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_intercept_errors on;
        error_page 404 = @frontend_fallback;
    }

    location @frontend_fallback {
        rewrite ^(.*)$ /index.html break;
        proxy_pass http://frontend;
    }
}
